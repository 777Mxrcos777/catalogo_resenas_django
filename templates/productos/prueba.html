{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>PRUEBA - Lista de Productos</h1>
    
    {% if productos %}
        <p>Hay {{ productos|length }} productos:</p>
        <ul>
        {% for p in productos %}
            <li>{{ p.nombre }} - ${{ p.precio }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No hay productos en la base de datos.</p>
    {% endif %}
</div>
{% endblock %}
