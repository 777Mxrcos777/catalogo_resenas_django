{% extends 'base.html' %}
{% load static %}

{% block title %}Crear Reseña - {{ producto.nombre }}{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <a href="{% url 'detalle_producto' producto.id_producto %}" class="btn-back">← Volver al producto</a>
        
        <h1 class="page-title">📝 Escribir Reseña</h1>
        <h2 class="producto-nombre">{{ producto.nombre }}</h2>
        
        <div class="form-card">
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_calificacion">Calificación (1-5):</label>
                    {{ form.calificacion }}
                </div>
                
                <div class="form-group">
                    <label for="id_texto">Comentario:</label>
                    {{ form.texto }}
                </div>
                
                <button type="submit" class="btn-submit">⭐ Enviar Reseña</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
